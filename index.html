function useLiveData(){
  const [games,setGames]=useState([]);
  const [status,setStatus]=useState({});
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [lastRefresh,setLastRefresh]=useState(null);

  const fetchGames=useCallback(async()=>{
    try{
      const res=await fetch(`${API_BASE}/api/games`);
      const data=await res.json();
      setGames(data.games||[]);
      setLastRefresh(new Date());
      setError(null);
    }catch(e){
      setError("Live server offline — showing demo data");
      setGames(DEMO_GAMES);
    }
  },[]);

  const fetchStatus=useCallback(async()=>{
    try{
      const res=await fetch(`${API_BASE}/api/status`);
      const data=await res.json();
      setStatus(data);
    }catch(e){setStatus({status:"offline"});}
  },[]);

  useEffect(()=>{
    const init=async()=>{setLoading(true);await Promise.all([fetchGames(),fetchStatus()]);setLoading(false);};
    init();
  },[]);

  useEffect(()=>{
    const interval=setInterval(()=>{fetchGames();fetchStatus();},5*60*1000);
    return()=>clearInterval(interval);
  },[fetchGames,fetchStatus]);

  return{games,status,loading,error,lastRefresh};
}
