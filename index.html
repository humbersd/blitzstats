function AIModal({game,onClose}){
  const [res,setRes]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!game)return;
    setLoading(true);setRes(null);
    const hS=game.hO>0?"+":"",aS=game.aO>0?"+":"";
    fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,
        messages:[{role:"user",content:`Sharp sports betting analyst. Analyze this ${game.sport} matchup.\nGame: ${game.away} @ ${game.home}\nMoneyline: ${game.home} ${hS}${game.hO} | ${game.away} ${aS}${game.aO}\nTotal O/U: ${game.total}\nWrite 3-4 sentences of sharp analysis, then:\nBEST BET: [pick]\nCONFIDENCE: [number]%`}]})})
    .then(r=>r.json())
    .then(d=>{
      const text=d.content?.[0]?.text||"";
      const pick=text.match(/BEST BET:\s*(.+)/i)?.[1]?.trim()||"See analysis";
      const conf=parseInt(text.match(/CONFIDENCE:\s*(\d+)/i)?.[1]||"65");
      const analysis=text.replace(/BEST BET:.+/gi,"").replace(/CONFIDENCE:.+/gi,"").trim();
      setRes({analysis,pick,conf});setLoading(false);
    })
    .catch(()=>{setRes({analysis:"Unable to connect. Try again.",pick:"N/A",conf:0});setLoading(false);});
  },[game]);
  if(!game)return null;
  const cc=res?.conf>=80?T.green:res?.conf>=70?T.accent:T.orange;
  return React.createElement("div",{onClick:e=>e.target===e.currentTarget&&onClose(),style:{position:"fixed",inset:0,background:"rgba(4,6,15,.92)",backdropFilter:"blur(10px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
